<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QHTML Test Board</title>
  <script>
    window.QHTML_EVENT_LOOP_MODE = "queued";
  </script>
  <script src="qhtml.js"></script>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: #ffffff;
      --ink: #11253d;
      --muted: #4f6078;
      --edge: #d2deec;
      --accent: #295a92;
      --pass: #0f7a52;
      --fail: #b42323;
      --deprecated: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Fira Sans", "Segoe UI", sans-serif;
    }
    .page { max-width: 1600px; margin: 0 auto; display: grid; gap: 14px; }
    .hero, .summary-shell, .test-card {
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 10px;
    }
    .hero { padding: 14px 16px; }
    .hero h1 { margin: 0 0 6px 0; color: var(--accent); font-size: 24px; }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; }
    .summary-shell { padding: 10px 12px; }
    .summary-row { display: flex; flex-wrap: wrap; gap: 14px; font-weight: 700; align-items: center; }
    .summary-pass { color: var(--pass); }
    .summary-fail { color: var(--fail); }
    .failed-list-wrap {
      margin-top: 8px;
      border: 1px solid #f3c2c2;
      background: #fff7f7;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .failed-list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .failed-list-title {
      margin: 0;
      font-weight: 700;
      color: var(--fail);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .failed-copy-btn {
      border: 1px solid #f3bcbc;
      background: #fff;
      color: #8b1d1d;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    #failed-tests-list {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 12px;
      line-height: 1.35;
      color: #8b1d1d;
    }
    .tests { display: grid; gap: 12px; }
    .test-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: #f7fbff;
      border-bottom: 1px solid var(--edge);
    }
    .test-head h2 { margin: 0; font-size: 15px; color: var(--accent); }
    .io-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }
    .cell {
      border: 1px solid var(--edge);
      border-radius: 8px;
      background: #fbfdff;
      min-height: 120px;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .cell h3 {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #34506d;
      border-bottom: 1px solid var(--edge);
      padding: 8px 10px;
    }
    pre {
      margin: 0;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 12px;
      line-height: 1.35;
    }
    .preview {
      margin: 0 10px 10px 10px;
      border: 1px dashed var(--edge);
      border-radius: 8px;
      background: #f8fbff;
      padding: 8px;
    }
    .preview h3 {
      margin: 0 0 8px 0;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #34506d;
    }
    .status {
      font-weight: 700;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid var(--edge);
      padding: 4px 8px;
      background: #eef4fb;
    }
    .status.pass { color: var(--pass); border-color: #b6e3d4; background: #f0fdf8; }
    .status.fail { color: var(--fail); border-color: #f4b8b8; background: #fff1f1; }
    .status.deprecated { color: var(--deprecated); border-color: #d1d5db; background: #f9fafb; }
    @media (max-width: 1120px) {
      .io-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>QHTML Syntax Input / Output Board</h1>
      <p>Checks run on <code>QHTMLContentLoaded</code> and then every 5 seconds. Manual logger tests run only when their buttons are pressed.</p>
    </section>

    <section class="summary-shell">
      <div class="summary-row">
        <span id="summary-total">Total: 0</span>
        <span id="summary-passed" class="summary-pass">Passed: 0</span>
        <span id="summary-failed" class="summary-fail">Failed: 0</span>
      </div>
      <div class="failed-list-wrap">
        <div class="failed-list-head">
          <p class="failed-list-title">Failing Tests</p>
          <button id="copy-failed-tests" class="failed-copy-btn" type="button">Copy</button>
        </div>
        <pre id="failed-tests-list">none</pre>
      </div>
    </section>

    <section id="tests" class="tests"></section>
  </div>

q-timer t49MainTimer {

      { n: 53, t: 'q-property changed: declarative + manual subscription (multi-change)', s: `q-component prop53 {
  q-property count: 0

  function appendValue(nodeId, value) {
    var node = $("#" + nodeId);
    var current = String(node.textContent || "");
    if (current.trim() === "waiting") {
      current = "";
    }
    node.textContent = current ? (current + "," + String(value)) : String(value);
  }

  onCoUnTcHaNgEd {
    this.appendValue("t53-decl", event.detail.params.value);
  }

  function run() {
    var self = this;
    this.addEventListener("countChanged", function(event) {
      self.appendValue("t53-manual", event.detail.params.value);
    });
    this.countChanged.connect(function(value) {
      self.appendValue("t53-connect", value);
    });
    this.count = 1;
    this.count = 2;
    this.count = 3;

    window.setTimeout(function() {
      var decl = $("#t53-decl").textContent;
      var manual = $("#t53-manual").textContent;
      var connected = $("#t53-connect").textContent;
      if (decl === "1,2,3" && manual === "1,2,3" && connected === "1,2,3") {
        $("#t53-status").textContent = "prop53-ok";

    function normalize(input) {
      return String(input == null ? '' : input).replace(/\s+/g, ' ').trim();
    }

    function buildBoard() {
      const container = document.querySelector('#tests');
      const active = [];

      tests.forEach((test) => {
        const article = document.createElement('article');
        article.className = 'test-card';
        article.innerHTML = `<div class="test-head"><h2>${test.n}. ${test.t}</h2><span class="status">pending</span></div>`;
        const statusNode = article.querySelector('.status');

        if (test.d === true) {
          statusNode.className = 'status deprecated';
          statusNode.textContent = 'deprecated';
          const grid = document.createElement('div');
          grid.className = 'io-grid';
          grid.innerHTML = `<section class="cell"><h3>Deprecated</h3><pre>test has been deprecated</pre></section>`;
          article.appendChild(grid);
          container.appendChild(article);
          return;
        }

        const grid = document.createElement('div');
        grid.className = 'io-grid';
        const sourceCell = document.createElement('section');
        sourceCell.className = 'cell';
        sourceCell.innerHTML = `<h3>QHTML Input</h3><pre></pre>`;
        sourceCell.querySelector('pre').textContent = test.s;

        const expectedCell = document.createElement('section');
        expectedCell.className = 'cell';
        expectedCell.innerHTML = `<h3>Expected Output</h3><pre></pre>`;
        expectedCell.querySelector('pre').textContent = test.e.join('\n');

        const actualCell = document.createElement('section');
        actualCell.className = 'cell';
        actualCell.innerHTML = `<h3>Actual Output</h3><pre></pre>`;
        const actualPre = actualCell.querySelector('pre');

        grid.appendChild(sourceCell);
        grid.appendChild(expectedCell);
        grid.appendChild(actualCell);
        article.appendChild(grid);

        const preview = document.createElement('section');
        preview.className = 'preview';
        preview.innerHTML = `<h3>Rendered Preview</h3>`;
        const host = document.createElement('q-html');
        host.id = `host-t${String(test.n).padStart(2, '0')}`;
        host.textContent = test.s;
        preview.appendChild(host);
        article.appendChild(preview);

        container.appendChild(article);
        active.push({ test, host, actualPre, statusNode });
      });

      function runChecks() {
        let passed = 0;
        let total = 0;
        const failedLines = [];

        active.forEach((entry) => {
          if (entry.test.m === true) {
            const doneSelector = String(entry.test.ms || "").trim();
            const doneNode = doneSelector ? entry.host.querySelector(doneSelector) : null;
            const done = doneNode && normalize(doneNode.textContent) === '1';
            if (!done) {
              entry.statusNode.className = 'status deprecated';
              entry.statusNode.textContent = 'manual';
              return;
            }
          }

          total += 1;
          const actualRaw = String(entry.host.innerHTML);
          const actualNormalized = normalize(actualRaw);
          entry.actualPre.textContent = actualRaw.trim();

          const ok = entry.test.e.every((part) => actualNormalized.includes(normalize(part)));
          entry.statusNode.className = ok ? 'status pass' : 'status fail';
          entry.statusNode.textContent = ok ? 'pass' : 'fail';
          if (ok) {
            passed += 1;
          } else {
            const expectedText = entry.test.e.join(' | ');
            const actualText = actualNormalized.length > 280 ? actualNormalized.slice(0, 280) + '…' : actualNormalized;
            failedLines.push(
              `${entry.test.n}. ${entry.test.t}\n  expected: ${expectedText}\n  actual:   ${actualText}`
            );
          }
        });

        document.querySelector('#summary-total').textContent = `Total: ${total}`;
        document.querySelector('#summary-passed').textContent = `Passed: ${passed}`;
        document.querySelector('#summary-failed').textContent = `Failed: ${total - passed}`;
        document.querySelector('#failed-tests-list').textContent = failedLines.length ? failedLines.join('\n\n') : 'none';
      }

      function wireCopyFailedButton() {
        const btn = document.querySelector('#copy-failed-tests');
        const pre = document.querySelector('#failed-tests-list');
        if (!btn || !pre) return;
        btn.addEventListener('click', function() {
          const text = String(pre.textContent || '').trim();
          if (!text || text === 'none') return;
          if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            navigator.clipboard.writeText(text).then(function() {
              btn.textContent = 'Copied';
              setTimeout(function() { btn.textContent = 'Copy'; }, 1200);
            }).catch(function() {});
          }
        });
      }

      document.addEventListener('QHTMLContentLoaded', runChecks);
      window.setInterval(runChecks, 5000);
      wireCopyFailedButton();
    }

    window.addEventListener('DOMContentLoaded', buildBoard);
  </script>
