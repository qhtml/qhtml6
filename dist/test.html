<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QHTML Test Board</title>
  <script src="qhtml.js"></script>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: #ffffff;
      --ink: #11253d;
      --muted: #4f6078;
      --edge: #d2deec;
      --accent: #295a92;
      --pass: #0f7a52;
      --fail: #b42323;
      --deprecated: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Fira Sans", "Segoe UI", sans-serif;
    }
    .page { max-width: 1600px; margin: 0 auto; display: grid; gap: 14px; }
    .hero, .summary-shell, .test-card {
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 10px;
    }
    .hero { padding: 14px 16px; }
    .hero h1 { margin: 0 0 6px 0; color: var(--accent); font-size: 24px; }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; }
    .summary-shell { padding: 10px 12px; }
    .summary-row { display: flex; flex-wrap: wrap; gap: 14px; font-weight: 700; align-items: center; }
    .summary-pass { color: var(--pass); }
    .summary-fail { color: var(--fail); }
    .tests { display: grid; gap: 12px; }
    .test-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: #f7fbff;
      border-bottom: 1px solid var(--edge);
    }
    .test-head h2 { margin: 0; font-size: 15px; color: var(--accent); }
    .io-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }
    .cell {
      border: 1px solid var(--edge);
      border-radius: 8px;
      background: #fbfdff;
      min-height: 120px;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .cell h3 {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #34506d;
      border-bottom: 1px solid var(--edge);
      padding: 8px 10px;
    }
    pre {
      margin: 0;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 12px;
      line-height: 1.35;
    }
    .preview {
      margin: 0 10px 10px 10px;
      border: 1px dashed var(--edge);
      border-radius: 8px;
      background: #f8fbff;
      padding: 8px;
    }
    .preview h3 {
      margin: 0 0 8px 0;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #34506d;
    }
    .status {
      font-weight: 700;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid var(--edge);
      padding: 4px 8px;
      background: #eef4fb;
    }
    .status.pass { color: var(--pass); border-color: #b6e3d4; background: #f0fdf8; }
    .status.fail { color: var(--fail); border-color: #f4b8b8; background: #fff1f1; }
    .status.deprecated { color: var(--deprecated); border-color: #d1d5db; background: #f9fafb; }
    @media (max-width: 1120px) {
      .io-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>QHTML Syntax Input / Output Board</h1>
      <p>Checks run on <code>QHTMLContentLoaded</code> and then every 5 seconds.</p>
    </section>

    <section class="summary-shell">
      <div class="summary-row">
        <span id="summary-total">Total: 0</span>
        <span id="summary-passed" class="summary-pass">Passed: 0</span>
        <span id="summary-failed" class="summary-fail">Failed: 0</span>
      </div>
    </section>

    <section id="tests" class="tests"></section>
  </div>

  <script>
    const tests = [
      { n: 1, t: 'Braces + text block', s: `div { text { hello-world } }`, e: ['hello-world'] },
      { n: 2, t: 'Selector chain + shorthand', s: `div#my-id.my-class,span.my-class,h2#id2 { hello world }`, e: ['<h2 id="id2">hello world</h2>'] },
      { n: 3, t: 'Attributes', s: `a { href: "https://example.com" target: "_blank" text { Open Example } }`, e: ['href="https://example.com"', 'Open Example'] },
      { n: 4, t: 'Style block + text', s: `p { style { font-size: 20px; margin: 0; } text { Plain text content } }`, e: ['Plain text content', 'font-size: 20px'] },
      { n: 5, t: 'HTML block', s: `div { html { <strong>Real HTML fragment</strong> } }`, e: ['<strong>Real HTML fragment</strong>'] },
      { n: 6, t: 'q-bind test', d: true },
      { n: 7, t: 'q-script inline replacement', s: `div { q-script { return "p { text { Inserted by q-script } }"; } }`, e: ['Inserted by q-script'] },
      { n: 8, t: 'q-script assignment form', s: `div { data-note: q-script { return "n:" + (4 + 1) } text { q-script { return "script-inline"; } } }`, e: ['data-note="n:5"', 'script-inline'] },
      { n: 9, t: 'q-macro + slot', s: `q-macro badge { slot { label } return { span.badge { text { \${this.slot("label")} } } } } div { badge { label { hello world } } }`, e: ['hello world', 'class="badge"'] },
      { n: 10, t: 'q-component + q-property + slot', s: `q-component app-card { q-property { title } div { h3 { text { \${this.component.title} } } slot { body } } } app-card { title: "Welcome" body { p { text { Projected content. } } } }`, e: ['Welcome', 'Projected content.'] },
      { n: 11, t: 'q-signal connect + emit', s: `q-component sender-box { q-signal sent(message) } q-component receiver-box { q-property msg: "pending" function setMsg(v) { this.msg = v } div { text { \${this.component.msg} } } } sender-box#sender { } receiver-box#recv { } onReady { $("#sender").sent.connect($("#recv").setMsg); $("#sender").sent("signal-ok"); $("#recv").update(); }`, e: ['signal-ok'] },
      { n: 12, t: 'q-alias', s: `q-component mycomp { q-alias myotherprop { return "hello world"; } div { text { \${this.component.myotherprop} } } } mycomp { }`, e: ['hello world'] },
      { n: 13, t: 'q-keyword aliasing', s: `q-keyword component { q-component } component card-box { div { text { hello } } } card-box { }`, e: ['hello'] },
      { n: 14, t: 'q-style direct apply', s: `q-style panel { backgroundColor: #eff6ff color: #1e293b border: 1px solid #93c5fd } panel,div { text { Styled panel } }`, e: ['Styled panel', 'border: 1px solid #93c5fd'] },
      { n: 15, t: 'q-theme selector mapping', s: `q-style title-accent { color: #1d4ed8 } q-style body-muted { backgroundColor: #64748b } q-theme article-theme { h3 { title-accent } p { body-muted } } article-theme { div { h3 { text { Title } } p { text { Description } } } }`, e: ['Title', 'Description'] },
      { n: 16, t: 'q-bind test', d: true },
      { n: 17, t: 'q-bind test', d: true },
      { n: 18, t: 'q-default-theme fallback + override', s: `q-style panel-base { backgroundColor: #eef3fb color: #0f172a } q-style panel-override { backgroundColor: #ffedd5 color: #7c2d12 } q-default-theme card-theme { .card { panel-base } } q-theme card-demo-theme { card-theme { } .card { panel-override } } card-demo-theme { div.card { text { themed card } } }`, e: ['themed card'] },
      { n: 19, t: 'q-array as q-property', s: `q-component my-comp { q-property mydivs: q-array { "hello world", 5, q-array { "multi-dimensional", 4 } } div { text { \${this.component.mydivs[0]} } } } my-comp { }`, e: ['hello world'] },
      { n: 20, t: 'q-map as q-property', s: `q-component my-comp { q-property settings: q-map { title: "Example" nested: q-map { enabled: true } } div { text { \${this.component.settings.nested.enabled} } } } my-comp { }`, e: ['true'] },
      { n: 21, t: 'named q-array + q-map reuse', s: `q-array shared-items {
  1, 2, 3
}
q-component my-comp {
  q-property mydivs: shared-items
  div { text { \${this.component.mydivs[1]} } }
}
my-comp { }`, e: ['2'] },
      { n: 22, t: 'property shorthand', s: `q-component short-prop { property label: "shorthand-ok" div { text { \${this.component.label} } } } short-prop { }`, e: ['shorthand-ok'] },
      { n: 23, t: 'q-model basics', s: `q-model my-model { q-array { 5, 10 } } div#model-count { text { pending } } onReady { var model = this["my-model"]; model.add(15); document.querySelector("#model-count").textContent = String(model.count()); }`, e: ['>3<'] },
      { n: 24, t: 'q-model-view basics', s: `q-array my-source { 5, 10, q-map { name: "tom" } } q-model-view { q-model { my-source } as { item } div { text { \${item && item.name ? item.name : item} } } }`, e: ['5', '10', 'tom'] },
      { n: 25, t: 'extends single inheritance', s: `q-component base-label { q-property label: "base-ok" } q-component child-label extends base-label { div { text { \${this.component.label} } } } child-label { }`, e: ['base-ok'] },
      { n: 26, t: 'extends multiple inheritance', s: `q-component base-a { q-property a: "A" } q-component base-b { q-property b: "B" } q-component child-multi extends base-a extends base-b { div { text { \${this.component.a}-\${this.component.b} } } } child-multi { }`, e: ['A-B'] },
      { n: 27, t: 'q-signal slot payload syntax', s: `q-component sender27 { q-signal sent(message) } q-component receiver27 { q-property msg: "pending" function setMsg(v) { this.msg = v } div { text { \${this.component.msg} } } } sender27#sender27 { } receiver27#receiver27 { } onReady { $("#sender27").sent.connect($("#receiver27").setMsg); $("#sender27").sent("file-open"); $("#receiver27").update(); }`, e: ['file-open'] },
      { n: 28, t: 'q-rewrite template-style', s: `q-rewrite make-strong { slot { input } return { strong { q-script { return String(this.slot("input")); } } } } div { make-strong { rewrite-ok } }`, e: ['rewrite-ok', '<strong>'] },
      { n: 29, t: 'qdom find + append', s: `div#qdom-find-target { text { before } } onReady { this.qdom().find("#qdom-find-target").appendNode("span { text { after } }"); this.update(); }`, e: ['before', 'after'] },
      { n: 30, t: 'qdom replaceWithQHTML', s: `div#replace-me { text { old } } onReady { this.qdom().find("#replace-me").replaceWithQHTML("div#replace-me { text { new } }"); this.update(); }`, e: ['new'] },
      { n: 31, t: 'qdom serialize + deserialize style flow', s: `div#ser { text { one } } div#out { text { pending } } onReady { var s = this.qdom().find("#ser").serialize(); this.qdom().find("#out").replaceWithQHTML(s); this.update(); }`, e: ['one'] },
      { n: 32, t: 'q-template basic', s: `q-template badge { span.badge { text { template badge } } } div { badge { } }`, e: ['template badge'] },
      { n: 33, t: 'q-macro scoped placeholder', s: `q-macro scoped-label { slot { value } return { p { text { value=\${this.slot("value")} } } } } scoped-label { value { demo-ref } }`, e: ['value=demo-ref'] },
      { n: 34, t: 'q-script returns QHTML', s: `q-script { return "div { text { dynamic-node } }"; }`, e: ['dynamic-node'] },
      { n: 35, t: 'q-script returns text', s: `div { q-script { return "plain-text-node"; } }`, e: ['plain-text-node'] },
      { n: 36, t: 'q-array nested access', s: `q-component arr-comp { q-property arr: q-array { "a", "b", q-array { "nested-a", "nested-b" } } div { text { \${this.component.arr[2][0]} } } } arr-comp { }`, e: ['nested-a'] },
      { n: 37, t: 'q-map nested access', s: `q-component map-comp { q-property settings: q-map { title: "MapTest" nested: q-map { enabled: true } } div { text { \${this.component.settings.title} - \${this.component.settings.nested.enabled} } } } map-comp { }`, e: ['MapTest - true'] },
      { n: 38, t: 'q-model from q-script source', s: `q-model my-model { q-array { 1, 2, 3 } } div#mv38 { text { pending } } onReady { var m = this["my-model"]; document.querySelector("#mv38").textContent = String(m.count()); }`, e: ['3'] },
      { n: 39, t: 'q-property-changed event', s: `q-component property-event-probe {
  q-property count: 1
  div {
    text { property-probe-ok }
  }
}
property-event-probe { }`, e: ['property-probe-ok'] },
      { n: 40, t: 'q-bind test', d: true },
      { n: 41, t: 'q-style-class merge', s: `q-style card-shell { q-style-class { w3-card w3-round-large w3-padding } borderColor: #cbd5e1 } card-shell,div#card41 { text { class-merge } }`, e: ['class-merge', 'w3-card'] },
      { n: 42, t: 'q-theme composition', s: `q-style button-base { backgroundColor: #0f766e color: #ffffff } q-style button-danger { backgroundColor: #b91c1c color: #ffffff } q-theme base-theme { button { button-base } } q-theme admin-theme { base-theme { } .danger { button-danger } } admin-theme { button.danger { text { Remove } } }`, e: ['Remove'] },
      { n: 43, t: 'scoped theme application', s: `q-style title-accent { color: #1d4ed8 } q-theme article-theme { h3 { title-accent } } article-theme { div { h3 { text { Scoped Title } } } }`, e: ['Scoped Title'] },
      { n: 44, t: 'scoped $() selector shortcut', s: `div#sender { text { sender-value } } div#result44 { text { pending } } onReady { $("#result44").textContent = $("#sender").textContent; }`, e: ['sender-value'] },
      { n: 45, t: 'root onReady hook', s: `onReady { this.setAttribute("data-ready", "1"); } div { text { root-ready } }`, e: ['root-ready'] },
      { n: 46, t: 'escaped brace in text', s: `div { text { hello world } }`, e: ['hello world'] }
    ];

    function normalize(input) {
      return String(input == null ? '' : input).replace(/\s+/g, ' ').trim();
    }

    function buildBoard() {
      const container = document.querySelector('#tests');
      const active = [];

      tests.forEach((test) => {
        const article = document.createElement('article');
        article.className = 'test-card';
        article.innerHTML = `<div class="test-head"><h2>${test.n}. ${test.t}</h2><span class="status">pending</span></div>`;
        const statusNode = article.querySelector('.status');

        if (test.d === true) {
          statusNode.className = 'status deprecated';
          statusNode.textContent = 'deprecated';
          const grid = document.createElement('div');
          grid.className = 'io-grid';
          grid.innerHTML = `<section class="cell"><h3>Deprecated</h3><pre>test has been deprecated</pre></section>`;
          article.appendChild(grid);
          container.appendChild(article);
          return;
        }

        const grid = document.createElement('div');
        grid.className = 'io-grid';
        const sourceCell = document.createElement('section');
        sourceCell.className = 'cell';
        sourceCell.innerHTML = `<h3>QHTML Input</h3><pre></pre>`;
        sourceCell.querySelector('pre').textContent = test.s;

        const expectedCell = document.createElement('section');
        expectedCell.className = 'cell';
        expectedCell.innerHTML = `<h3>Expected Output</h3><pre></pre>`;
        expectedCell.querySelector('pre').textContent = test.e.join('\n');

        const actualCell = document.createElement('section');
        actualCell.className = 'cell';
        actualCell.innerHTML = `<h3>Actual Output</h3><pre></pre>`;
        const actualPre = actualCell.querySelector('pre');

        grid.appendChild(sourceCell);
        grid.appendChild(expectedCell);
        grid.appendChild(actualCell);
        article.appendChild(grid);

        const preview = document.createElement('section');
        preview.className = 'preview';
        preview.innerHTML = `<h3>Rendered Preview</h3>`;
        const host = document.createElement('q-html');
        host.id = `host-t${String(test.n).padStart(2, '0')}`;
        host.textContent = test.s;
        preview.appendChild(host);
        article.appendChild(preview);

        container.appendChild(article);
        active.push({ test, host, actualPre, statusNode });
      });

      function runChecks() {
        let passed = 0;
        let total = 0;

        active.forEach((entry) => {
          total += 1;
          const actualRaw = String(entry.host.innerHTML);
          const actualNormalized = normalize(actualRaw);
          entry.actualPre.textContent = actualRaw.trim();

          const ok = entry.test.e.every((part) => actualNormalized.includes(normalize(part)));
          entry.statusNode.className = ok ? 'status pass' : 'status fail';
          entry.statusNode.textContent = ok ? 'pass' : 'fail';
          if (ok) {
            passed += 1;
          }
        });

        document.querySelector('#summary-total').textContent = `Total: ${total}`;
        document.querySelector('#summary-passed').textContent = `Passed: ${passed}`;
        document.querySelector('#summary-failed').textContent = `Failed: ${total - passed}`;
      }

      document.addEventListener('QHTMLContentLoaded', runChecks);
      window.setInterval(runChecks, 5000);
    }

    window.addEventListener('DOMContentLoaded', buildBoard);
  </script>
</body>
</html>
