<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Particle Emitter Editor</title>
  <style>
    :root{--bg:#0b1020;--panel:rgba(15,23,42,.94);--surface-2:#1f2937;--text:#e5e7eb;--muted:#94a3b8;--line:rgba(148,163,184,.28);--accent:#22c55e;--shadow:0 24px 80px rgba(0,0,0,.42);--radius:18px;--stage-w:70vw;--stage-h:70vh;--sidebar-w:320px}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at 15% 15%,rgba(34,197,94,.16),transparent 28%),radial-gradient(circle at 80% 20%,rgba(59,130,246,.14),transparent 26%),linear-gradient(135deg,#020617,var(--bg));color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-columns:var(--sidebar-w) 1fr;gap:18px;padding:18px}.sidebar{min-width:0;display:grid;grid-template-rows:auto auto 1fr;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.sidebar-head{display:grid;gap:8px;padding:18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(34,197,94,.13),transparent)}.title{margin:0;font-size:20px;font-weight:900;letter-spacing:-.045em}.subtitle{margin:0;color:var(--muted);font-size:13px;line-height:1.45}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px}.tool-btn,.dialog-btn{min-height:42px;border:1px solid var(--line);border-radius:13px;background:var(--surface-2);color:var(--text);font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:8px}.tool-btn.primary,.dialog-btn.primary{background:var(--accent);color:#04130a;border-color:rgba(255,255,255,.18);box-shadow:0 12px 36px rgba(34,197,94,.24)}.dialog-btn.danger{background:rgba(239,68,68,.14);color:#fecaca;border-color:rgba(239,68,68,.35)}.emitter-list-wrap{min-height:0;padding:0 18px 18px;overflow:auto}.emitter-list-label{margin:0 0 10px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.14em}.emitter-list{display:flex;flex-wrap:wrap;align-content:start;gap:9px}.emitter-chip{min-height:36px;max-width:100%;border:1px solid var(--line);border-radius:999px;background:rgba(15,23,42,.8);color:var(--text);padding:0 12px;font-size:13px;font-weight:800;display:inline-flex;align-items:center;gap:8px}.emitter-chip.is-selected{color:#04130a;background:var(--accent);border-color:transparent}.emitter-chip .dot{width:8px;height:8px;border-radius:999px;background:currentColor;opacity:.75}.workspace{min-width:0;min-height:0;display:grid;place-items:center;overflow:auto;padding:18px}.stage-shell{display:grid;gap:12px}.stage-label{display:flex;align-items:baseline;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px}.stage-label strong{color:var(--text)}#particle-stage{position:relative;width:var(--stage-w);height:var(--stage-h);min-width:420px;min-height:340px;overflow:hidden;border-radius:28px;border:1px solid rgba(148,163,184,.35);background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),radial-gradient(circle at 50% 100%,rgba(34,197,94,.16),transparent 45%),linear-gradient(180deg,#020617,#0f172a);background-size:32px 32px,32px 32px,100% 100%,100% 100%;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),0 28px 90px rgba(0,0,0,.38)}.stage-empty{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;color:rgba(226,232,240,.4);font-weight:800;letter-spacing:-.03em;text-align:center;padding:24px}#particle-stage.has-emitters .stage-empty{display:none}.modal-backdrop{position:fixed;inset:0;z-index:10000;display:none;place-items:center;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);padding:20px}.modal-backdrop.is-open{display:grid}.dialog{width:min(1060px,96vw);max-height:min(900px,92vh);display:grid;grid-template-rows:auto 1fr auto;overflow:hidden;border-radius:24px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}.dialog.small{width:min(880px,96vw)}.dialog-header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.06),transparent)}.dialog-title{margin:0;font-size:18px;letter-spacing:-.035em}.x-btn{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--line);border-radius:12px;color:var(--text);background:rgba(255,255,255,.05);font-size:24px;line-height:1}.dialog-body{min-height:0;overflow:auto;padding:18px 20px}.dialog-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--line)}.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.field-group{border:1px solid var(--line);border-radius:18px;padding:14px;background:rgba(15,23,42,.6);display:grid;gap:12px;align-content:start}.field-group.double{grid-column:span 2}.field-group.full{grid-column:1/-1}.group-title{margin:0;color:#dbeafe;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.12em}.field-row{display:grid;grid-template-columns:minmax(120px,.72fr) minmax(0,1fr);gap:10px;align-items:center}.field-row label{color:var(--muted);font-size:12px;font-weight:850;overflow-wrap:anywhere}.field-row input,.field-row select,.field-row textarea{width:100%;min-height:36px;border:1px solid rgba(148,163,184,.28);border-radius:11px;background:rgba(2,6,23,.74);color:var(--text);padding:8px 10px;outline:none}.field-row input[type=checkbox]{width:auto;min-height:auto;justify-self:start;transform:scale(1.15)}.field-row input[type=color]{padding:3px;height:38px}.field-row input:focus,.field-row textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,197,94,.14)}.src-row{grid-template-columns:120px minmax(0,1fr) auto}.file-btn{min-height:36px;padding:0 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-weight:800;white-space:nowrap}.hidden-file{display:none}.export-textarea{width:100%;height:min(62vh,560px);resize:vertical;border:1px solid var(--line);border-radius:18px;background:#020617;color:#d1fae5;padding:16px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:13px;line-height:1.45;outline:none;white-space:pre}.copy-icon{width:19px;height:19px;display:block}.toast{position:fixed;left:50%;bottom:24px;z-index:20000;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:opacity 160ms ease,transform 160ms ease;padding:10px 14px;border-radius:999px;background:var(--accent);color:#04130a;font-weight:900;box-shadow:0 12px 40px rgba(0,0,0,.35)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:1100px){:root{--sidebar-w:280px;--stage-w:64vw}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:820px){html,body{overflow:auto}.app{min-height:100%;grid-template-columns:1fr}.sidebar{grid-template-rows:auto auto auto}.workspace{overflow:visible}#particle-stage{width:92vw;height:62vh;min-width:0}.form-grid{grid-template-columns:1fr}.field-group.double{grid-column:auto}.field-row,.src-row{grid-template-columns:1fr}}
  </style>
<script src="qhtml.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-head"><h1 class="title">Particle Editor</h1><p class="subtitle">Create, tune, import sprite images, and export live <code>particle-emitter</code> markup.</p></header>
      <div class="toolbar"><button id="new-emitter-btn" class="tool-btn primary" type="button">New Emitter</button><button id="export-btn" class="tool-btn" type="button">Export</button></div>
      <section class="emitter-list-wrap"><p class="emitter-list-label">Emitters</p><div id="emitter-list" class="emitter-list"></div></section>
    </aside>
    <main class="workspace"><section class="stage-shell"><div class="stage-label"><strong>Live Stage</strong><span>70vw × 70vh preview container</span></div><div id="particle-stage" aria-label="particle preview stage"><div class="stage-empty">Create an emitter to start previewing particles.</div></div></section></main>
  </div>
  <div id="editor-modal" class="modal-backdrop" aria-hidden="true"><section class="dialog" role="dialog" aria-modal="true" aria-labelledby="editor-title"><header class="dialog-header"><h2 id="editor-title" class="dialog-title">Emitter</h2><button class="x-btn" data-close="editor" type="button" aria-label="Close">×</button></header><form id="emitter-form"><div class="dialog-body"><div id="form-fields" class="form-grid"></div><input id="sprite-file" class="hidden-file" type="file" accept="image/*"></div><footer class="dialog-footer"><button id="delete-emitter-btn" class="dialog-btn danger" type="button">Delete</button><button class="dialog-btn" data-close="editor" type="button">Cancel</button><button class="dialog-btn primary" type="submit">Apply</button></footer></form></section></div>
  <div id="export-modal" class="modal-backdrop" aria-hidden="true"><section class="dialog small" role="dialog" aria-modal="true" aria-labelledby="export-title"><header class="dialog-header"><h2 id="export-title" class="dialog-title">Export Stage innerHTML</h2><button class="x-btn" data-close="export" type="button" aria-label="Close">×</button></header><div class="dialog-body"><textarea id="export-text" class="export-textarea" spellcheck="false"></textarea></div><footer class="dialog-footer"><button id="copy-export-btn" class="dialog-btn primary" type="button" title="Copy to clipboard"><svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h10v12H8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path><path d="M6 16H4V4h12v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>Copy</button><button class="dialog-btn" data-close="export" type="button">Close</button></footer></section></div>
  <div id="toast" class="toast">Copied</div>
  <script>
    (function(){"use strict";
      const DEFAULT_PARTICLE_SRC="/packages/qhtml6/dist/assets/particle.png";
      const FIELD_GROUPS=[
        {title:"Identity",className:"field-group",fields:[{attr:"emitter-name",label:"Name",type:"text",value:"Emitter"},{attr:"id",label:"Element ID",type:"text",value:""},{attr:"running",label:"Running",type:"checkbox",value:"true"},{attr:"qhtml-unsynced",label:"QHTML Unsynced",type:"text",value:"1"}]},
        {title:"Sprite / Image",className:"field-group double",fields:[{attr:"src",label:"Image src",type:"src",value:DEFAULT_PARTICLE_SRC},{attr:"color",label:"Tint Color",type:"color",value:"#08c473"}]},
        {title:"Emission",className:"field-group",fields:[{attr:"emitrate",label:"Emit Rate",type:"number",value:"74",step:"1"},{attr:"interval",label:"Interval",type:"number",value:"10",step:"1"},{attr:"maxactiveparticles",label:"Max Active",type:"number",value:"166",step:"1"},{attr:"maxactiveparticlesvariation",label:"Max Active Variation",type:"number",value:"18",step:"1"}]},
        {title:"Lifetime",className:"field-group",fields:[{attr:"lifetime",label:"Lifetime",type:"number",value:"700",step:"1"},{attr:"lifetimevariation",label:"Lifetime Variation",type:"number",value:"90",step:"1"}]},
        {title:"Position",className:"field-group",fields:[{attr:"x",label:"X",type:"number",value:"110",step:"1"},{attr:"y",label:"Y",type:"number",value:"114",step:"1"},{attr:"xvariation",label:"X Variation",type:"number",value:"845",step:"1"},{attr:"yvariation",label:"Y Variation",type:"number",value:"20",step:"1"}]},
        {title:"Velocity",className:"field-group",fields:[{attr:"xvelocity",label:"X Velocity",type:"number",value:"0",step:"0.01"},{attr:"yvelocity",label:"Y Velocity",type:"number",value:"-1.75",step:"0.01"},{attr:"xvelocityvariation",label:"X Velocity Variation",type:"number",value:"0",step:"0.01"},{attr:"yvelocityvariation",label:"Y Velocity Variation",type:"number",value:"0.04",step:"0.01"}]},
        {title:"Acceleration",className:"field-group",fields:[{attr:"xacceleration",label:"X Acceleration",type:"number",value:"0",step:"0.0001"},{attr:"yacceleration",label:"Y Acceleration",type:"number",value:"0.0028",step:"0.0001"},{attr:"xaccelerationvariation",label:"X Accel Variation",type:"number",value:"0",step:"0.0001"},{attr:"yaccelerationvariation",label:"Y Accel Variation",type:"number",value:"0.005",step:"0.0001"}]},
        {title:"Size",className:"field-group",fields:[{attr:"startsize",label:"Start Size",type:"number",value:"25",step:"1"},{attr:"endsize",label:"End Size",type:"number",value:"1",step:"1"},{attr:"startsizevariation",label:"Start Size Variation",type:"number",value:"7",step:"1"},{attr:"endsizevariation",label:"End Size Variation",type:"number",value:"5",step:"1"}]},
        {title:"Opacity",className:"field-group",fields:[{attr:"startopacity",label:"Start Opacity",type:"number",value:"0.5",step:"0.01",min:"0",max:"1"},{attr:"endopacity",label:"End Opacity",type:"number",value:"0.02",step:"0.01",min:"0",max:"1"},{attr:"startopacityvariation",label:"Start Opacity Variation",type:"number",value:"0.16",step:"0.01",min:"0",max:"1"},{attr:"endopacityvariation",label:"End Opacity Variation",type:"number",value:"0.02",step:"0.01",min:"0",max:"1"}]},
        {title:"Element Style",className:"field-group full",fields:[{attr:"style",label:"Style",type:"textarea",value:"position: absolute; inset: 0px; display: block; pointer-events: none; overflow: hidden; z-index: 1;"}]}
      ];
      class Dom{static byId(id){return document.getElementById(id)}static el(tagName,attrs,children){const node=document.createElement(tagName);Object.entries(attrs||{}).forEach(([key,value])=>{if(key==="className")node.className=value;else if(key==="text")node.textContent=value;else if(key.startsWith("on")&&typeof value==="function")node.addEventListener(key.slice(2).toLowerCase(),value);else if(value!==null&&value!==undefined)node.setAttribute(key,String(value))});(children||[]).forEach(child=>{if(child===null||child===undefined)return;node.appendChild(typeof child==="string"?document.createTextNode(child):child)});return node}}
      class Toast{constructor(node){this.node=node;this.timer=0}show(message){this.node.textContent=message;this.node.classList.add("show");clearTimeout(this.timer);this.timer=setTimeout(()=>this.node.classList.remove("show"),1400)}}
      class Modal{constructor(node){this.node=node;this.node.querySelectorAll("[data-close]").forEach(button=>button.addEventListener("click",()=>this.close()));this.node.addEventListener("pointerdown",event=>{if(event.target===this.node)this.close()})}open(){this.node.classList.add("is-open");this.node.setAttribute("aria-hidden","false")}close(){this.node.classList.remove("is-open");this.node.setAttribute("aria-hidden","true")}}
      class FieldRegistry{constructor(groups){this.groups=groups;this.fields=groups.flatMap(group=>group.fields);this.byAttr=new Map(this.fields.map(field=>[field.attr,field]))}defaults(){const result=Object.create(null);this.fields.forEach(field=>{result[field.attr]=field.value});return result}attrs(){return this.fields.map(field=>field.attr)}}
      class ParticleEmitterFactory{constructor(registry){this.registry=registry;this.counter=0}nextName(){this.counter+=1;return `Emitter ${this.counter}`}nextId(){return `particle-emitter-${Date.now()}-${this.counter+1}`}create(attrs){const emitter=document.createElement("particle-emitter");const data=Object.assign(this.registry.defaults(),attrs||{});if(!data["emitter-name"]||data["emitter-name"]==="Emitter")data["emitter-name"]=this.nextName();if(!data.id)data.id=this.nextId();this.apply(emitter,data);return emitter}read(emitter){const data=this.registry.defaults();this.registry.attrs().forEach(attr=>{if(emitter.hasAttribute(attr))data[attr]=emitter.getAttribute(attr)});return data}apply(emitter,data){this.registry.attrs().forEach(attr=>{const value=data[attr];if(value===null||value===undefined||value===""){if(attr!=="emitter-name"&&attr!=="id")emitter.removeAttribute(attr);return}emitter.setAttribute(attr,String(value))})}}
      class EmitterList{constructor(node,editor){this.node=node;this.editor=editor;this.selected=null}select(emitter){this.selected=emitter;this.render()}render(){const emitters=this.editor.emitters();this.node.innerHTML="";emitters.forEach(emitter=>{const chip=Dom.el("button",{className:"emitter-chip"+(emitter===this.selected?" is-selected":""),type:"button",onClick:()=>{this.select(emitter);this.editor.openEditor(emitter)}},[Dom.el("span",{className:"dot"}),Dom.el("span",{text:emitter.getAttribute("emitter-name")||emitter.id||"Emitter"})]);this.node.appendChild(chip)})}}
      class EmitterForm{constructor(node,registry,factory,editor){this.node=node;this.registry=registry;this.factory=factory;this.editor=editor;this.currentEmitter=null;this.mode="create";this.inputs=new Map();this.fieldsNode=Dom.byId("form-fields");this.fileInput=Dom.byId("sprite-file");this.build();this.node.addEventListener("submit",event=>{event.preventDefault();this.commit()});this.node.addEventListener("input",event=>{const input=event.target.closest("[data-attr]");if(!input||!this.currentEmitter)return;this.applyLive()});this.fileInput.addEventListener("change",()=>this.importImage());Dom.byId("delete-emitter-btn").addEventListener("click",()=>this.deleteCurrent())}build(){this.fieldsNode.innerHTML="";this.registry.groups.forEach(group=>{const groupNode=Dom.el("fieldset",{className:group.className},[Dom.el("legend",{className:"group-title",text:group.title})]);group.fields.forEach(field=>groupNode.appendChild(this.createField(field)));this.fieldsNode.appendChild(groupNode)})}createField(field){const id=`field-${field.attr}`;let input;if(field.type==="textarea"){input=Dom.el("textarea",{id,"data-attr":field.attr,rows:"3"})}else if(field.type==="checkbox"){input=Dom.el("input",{id,"data-attr":field.attr,type:"checkbox"})}else if(field.type==="src"){input=Dom.el("input",{id,"data-attr":field.attr,type:"text"});const browse=Dom.el("button",{type:"button",className:"file-btn",text:"Browse",onClick:()=>this.fileInput.click()});const row=Dom.el("div",{className:"field-row src-row"},[Dom.el("label",{for:id,text:field.label}),input,browse]);this.inputs.set(field.attr,input);return row}else{input=Dom.el("input",{id,"data-attr":field.attr,type:field.type||"text",step:field.step,min:field.min,max:field.max})}this.inputs.set(field.attr,input);return Dom.el("div",{className:"field-row"},[Dom.el("label",{for:id,text:field.label}),input])}load(emitter,mode){const data=this.factory.read(emitter);this.currentEmitter=emitter;this.mode=mode||"edit";this.inputs.forEach((input,attr)=>{const field=this.registry.byAttr.get(attr);const value=data[attr]??field.value??"";if(input.type==="checkbox")input.checked=value===true||value==="true"||value==="1";else input.value=value});Dom.byId("editor-title").textContent=this.mode==="create"?"New Particle Emitter":"Edit Particle Emitter";Dom.byId("delete-emitter-btn").style.display=this.mode==="create"?"none":"inline-flex"}values(){const data=Object.create(null);this.inputs.forEach((input,attr)=>{data[attr]=input.type==="checkbox"?(input.checked?"true":"false"):input.value});return data}applyLive(){if(!this.currentEmitter)return;this.factory.apply(this.currentEmitter,this.values());this.editor.afterEmitterChanged(this.currentEmitter)}commit(){this.applyLive();this.editor.editorModal.close()}deleteCurrent(){if(!this.currentEmitter||this.mode==="create")return;this.currentEmitter.remove();this.currentEmitter=null;this.editor.afterEmitterDeleted();this.editor.editorModal.close()}importImage(){const file=this.fileInput.files&&this.fileInput.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{const srcInput=this.inputs.get("src");srcInput.value=String(reader.result||"");this.applyLive();this.fileInput.value=""};reader.readAsDataURL(file)}}
      class Exporter{constructor(editor,modal,textarea,toast){this.editor=editor;this.modal=modal;this.textarea=textarea;this.toast=toast}open(){this.textarea.value=this.editor.exportInnerHTML();this.modal.open();this.textarea.focus();this.textarea.select()}async copy(){const value=this.textarea.value;try{await navigator.clipboard.writeText(value);this.toast.show("Copied export markup")}catch(error){this.textarea.focus();this.textarea.select();document.execCommand("copy");this.toast.show("Copied export markup")}}}
      class ParticleEditor{constructor(){this.stage=Dom.byId("particle-stage");this.registry=new FieldRegistry(FIELD_GROUPS);this.factory=new ParticleEmitterFactory(this.registry);this.editorModal=new Modal(Dom.byId("editor-modal"));this.exportModal=new Modal(Dom.byId("export-modal"));this.toast=new Toast(Dom.byId("toast"));this.list=new EmitterList(Dom.byId("emitter-list"),this);this.form=new EmitterForm(Dom.byId("emitter-form"),this.registry,this.factory,this);this.exporter=new Exporter(this,this.exportModal,Dom.byId("export-text"),this.toast);Dom.byId("new-emitter-btn").addEventListener("click",()=>this.newEmitter());Dom.byId("export-btn").addEventListener("click",()=>this.exporter.open());Dom.byId("copy-export-btn").addEventListener("click",()=>this.exporter.copy());this.list.render();this.refreshStageState()}emitters(){return Array.from(this.stage.querySelectorAll(":scope > particle-emitter"))}newEmitter(){const emitter=this.factory.create();this.stage.appendChild(emitter);this.list.select(emitter);this.form.load(emitter,"create");this.editorModal.open();this.afterEmitterChanged(emitter)}openEditor(emitter){this.form.load(emitter,"edit");this.editorModal.open()}afterEmitterChanged(emitter){this.refreshStageState();this.list.select(emitter);this.list.render()}afterEmitterDeleted(){this.refreshStageState();this.list.select(null);this.list.render()}refreshStageState(){this.stage.classList.toggle("has-emitters",this.emitters().length>0)}exportInnerHTML(){return this.stage.innerHTML.replace(/\s*<div class="stage-empty">[\s\S]*?<\/div>\s*/g,"").trim()}}
      window.addEventListener("DOMContentLoaded",()=>{window.particleEditor=new ParticleEditor()});
    }());
  </script>
</body>
</html>
