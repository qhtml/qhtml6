<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QHTML Framework Capability Harness</title>
  <link rel="stylesheet" href="w3.css" />
  <script src="q-editor.js"></script>
  <script src="qhtml.js?v=6.1.5"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #dbe7f4;
      color: #0f172a;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    q-html {
      display: block;
      min-height: 100vh;
    }

    .qbuilder-node-highlight {
      outline: 2px solid #f59e0b !important;
      outline-offset: 1px;
      border-color: #f59e0b !important;
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.35);
    }

    @media (max-width: 1080px) {
      .page-builder-app {
        grid-template-columns: 1fr !important;
      }

      .page-builder-canvas-card {
        height: auto !important;
        min-height: calc(100vh - 20rem);
      }
    }
  </style>
</head>
<body>
  <q-html id="page-builder-host">
q-import { q-components.qhtml?v=6.1.5 }
q-import { page-builder/page-builder.qhtml?v=6.1.5-treeview-4 }
q-import { page-builder/page-builder-starter.qhtml?v=6.1.5 }
page-builder-app { }
  </q-html>
</body>
</html>
